name: Karya DE Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Gerekli paketler
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git cmake extra-cmake-modules \
            qt6-base qt6-declarative qt6-wayland qt6-tools \
            kconfig kcoreaddons ki18n kio kservice kwindowsystem kwayland \
            python python-pip jq pciutils

      - name: Kodu indir
        uses: actions/checkout@v4

      - name: PKGBUILD'leri derle
        run: |
          useradd -m builder
          chown -R builder:builder .
          cd packages/karya-drivers
          su builder -c "makepkg -s --noconfirm"
          cp *.pkg.tar.zst /tmp/

          cd ../karya-icons
          su builder -c "makepkg -s --noconfirm"
          cp *.pkg.tar.zst /tmp/

          cd ../karya-oobe
          su builder -c "makepkg -s --noconfirm"
          cp *.pkg.tar.zst /tmp/

          cd ../karya-widgets
          su builder -c "makepkg -s --noconfirm"
          cp *.pkg.tar.zst /tmp/

      - name: Release yukle
        uses: softprops/action-gh-release@v1
        with:
          files: /tmp/*.pkg.tar.zst
          generate_release_notes: true
