# ============================================================
# Karya DE - Kernel Sertlestirme (Sysctl)
# ============================================================
# Bu dosya /etc/sysctl.d/90-karya-hardening.conf dosyasina
# kopyalanir ve kernel seviyesinde guvenlik saglar.
# ============================================================

# --- BELLEK GUVENLIGI ---

# ASLR: Address Space Layout Randomization
# 0 = kapali, 1 = randomize mmap, 2 = tam randomize (stack, mmap, VDSO)
kernel.randomize_va_space=2

# KPointerTag: Kernel pointer erisimini kisitla
# 0 = herkes gorebilir, 1=root gorebilir, 2=kimse goremez
kernel.kptr_restrict=2

# dmesg erisimini kisitla (CAP_SYSLOG gerekir)
kernel.dmesg_restrict=1

# BPF JIT compiler'ini devre disi birak
net.core.bpf_jit_enable=0
net.core.bpf_jit_harden=2

# Kexec'i kapat (cokekirdek yukleme)
kernel.kexec_load_disabled=1

# Kernel module imzalama zorunlulugu
kernel.modules_disabled=0
kernel.module_signing=1

# User namespaces'i kisitla
user.max_user_namespaces=0

# --- AG GUVENLIGI ---

# SYN flood korumasi
net.ipv4.tcp_syncookies=1
net.ipv4.tcp_syn_retries=5
net.ipv4.tcp_synack_retries=2

# IP spoofing korumasi (rp_filter)
net.ipv4.conf.all.rp_filter=1
net.ipv4.conf.default.rp_filter=1

# ICMP redirect kabul etme
net.ipv4.conf.all.accept_redirects=0
net.ipv4.conf.default.accept_redirects=0
net.ipv6.conf.all.accept_redirects=0
net.ipv6.conf.default.accept_redirects=0

# ICMP redirect gonderme
net.ipv4.conf.all.send_redirects=0
net.ipv4.conf.default.send_redirects=0

# Source routing kapat
net.ipv4.conf.all.accept_source_route=0
net.ipv4.conf.default.accept_source_route=0
net.ipv6.conf.all.accept_source_route=0
net.ipv6.conf.default.accept_source_route=0

# Martians (gizemli paketler) logla
net.ipv4.conf.all.log_martians=1
net.ipv4.conf.default.log_martians=1

# TCP timestamps kapat (zamanlama saldirilarina karsi)
net.ipv4.tcp_timestamps=0

# SYN cookieleri zorla
net.ipv4.tcp_syncookies=1

# Ag baglantisi zaman asimi
net.ipv4.tcp_fin_timeout=15
net.ipv4.tcp_keepalive_time=300
net.ipv4.tcp_keepalive_probes=5
net.ipv4.tcp_keepalive_intvl=15

# ARP izleme
net.ipv4.conf.all.arp_ignore=1
net.ipv4.conf.all.arp_announce=2
net.ipv4.conf.default.arp_ignore=1
net.ipv4.conf.default.arp_announce=2

# IPv6 privacy extensions (SLAAC gizlilik)
net.ipv6.conf.all.use_tempaddr=2
net.ipv6.conf.default.use_tempaddr=2

# IPv6 router reklamlarini kisitla
net.ipv6.conf.all.accept_ra=0
net.ipv6.conf.default.accept_ra=0
net.ipv6.conf.all.router_solicitations=0
net.ipv6.conf.default.router_solicitations=0

# --- COREDUMP GUVENLIGI ---

# SUID/SGID programlarin core dump'larini engelle
fs.suid_dumpable=0

# Core dump dosya boyutu
kernel.core_uses_pid=1

# --- DOSYA SISTEMI ---

# Dosya sistemi islemleri icin sure siniri (ms)
fs.file-max=500000

