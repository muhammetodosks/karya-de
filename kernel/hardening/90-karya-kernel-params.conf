# ============================================================
# Karya DE - Kernel Komut Satiri Parametreleri
# ============================================================
# Bu dosya /etc/default/grub icin kernel parametrelerini
# tanimlar. GRUB_CMDLINE_LINUX_DEFAULT icine eklenir.
# ============================================================

# --- BELLEK GUVENLIGI ---

# Page Table Isolation (Meltdown korumasi)
pti=on

# Kernel Page Table Isolation
kpti=1

# Speculative Store Bypass (Spectre v4)
ssbd=force

# Speculative Return Stack Overflow
srso=on

# Return Stack Buffer (Spectre v2)
retbleed=auto

# L1 Terminal Fault korumasi
l1tf=full

# MDS (ZombieLoad) korumasi
mds=full

# TAA (TSX Async Abort) korumasi
tsx_async_abort=full

# MMIO Stale Data korumasi
mmio_stale_data=full

# --- INTEL BLOKLAMA ---

# Intel microcode'u pasif gec (guvenlik riski)
# Karya DE Intel desteklemez
mitigations=auto

# --- KERNEL SERTLESTIRME ---

# Kernel lockdown modu (confidentiality)
lockdown=confidentiality

# Module imzalama zorunlulugu
module.sig_enforce=1

# DMA API donanim tabanli bellek yalitimi
iommu.passthrough=0
intel_iommu=on
amd_iommu=on

# Kernel stack smashing korumasi
stack_guard_gap=256

# Userspace pointer erisim korumasi
vsyscall=none

# DebugFS kapat
debugfs=off

# /dev/mem ve /dev/kmem kapat
mem.devmem=0

# Kernel bellek sifirlama
page_poison=1
slub_debug=FZ

# --- PERFORMANS (Intel bloklandiktan sonra) ---

# NVIDIA GPU icin
nvidia_drm.modeset=1
nvidia.NVreg_EnableGpuFirmware=0
nvidia.NVreg_EnableResizableBar=1
nvidia.NVreg_UsePageAttributeTable=1
nvidia.NVreg_InitializeSystemMemoryAllocations=0
nvidia.NVreg_DynamicPowerManagement=0x02

# AMD GPU icin
amdgpu.si_support=1
amdgpu.cik_support=1
amdgpu.dc=1
amdgpu.dpm=1
amdgpu.ppfeaturemask=0xffffffff

# IOMMU
iommu=force
iommu.passthrough=0
intel_iommu=on,sm_on
amd_iommu=on

# --- DIGER ---
quiet
splash
nowatchdog
modprobe.blacklist=i915
modprobe.blacklist=intel_agp
modprobe.blacklist=intel_gtt
modprobe.blacklist=mei
modprobe.blacklist=mei_me
