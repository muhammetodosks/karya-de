# ============================================================
# Karya DE - Kernel Module Engelleme
# ============================================================
# Bu dosya /etc/modprobe.d/90-karya-security.conf
# Guvenlik riski olusturan kernel modullerini engeller.
# ============================================================

# --- INTEL GPU MODULLERI (Tamamen Engellendi) ---
# Karya DE Intel GPU desteklemez.
# Bu moduller yuklenirse, Intel GPU calismaya calisir.
install i915 /bin/false
install i915_bdw /bin/false
install i915_skl /bin/false
install i915_kbl /bin/false
install i915_cfl /bin/false
install i915_icl /bin/false
install i915_tgl /bin/false
install i915_adl /bin/false
install intel_agp /bin/false
install intel_gtt /bin/false
install intel_vsec /bin/false
install intel_uncore /bin/false
install intel_pmc_core /bin/false
install intel_pch_thermal /bin/false
install intel_rapl /bin/false
install intel_soc_dts_thermal /bin/false
install intel_lpss /bin/false
install intel_lpss_pci /bin/false
install mei /bin/false
install mei_me /bin/false
install mei_hdcp /bin/false
install mei_pxp /bin/false
install intel_telemetry /bin/false
install intel_rapl_msr /bin/false
install intel_rapl_common /bin/false

# --- GUVENLIK RISKI TASIVAN MODULLER ---

# USB depolama (sadece gerekirse ac)
install usb_storage /bin/false

# Bluetooth (guvenlik acigi gecmisi)
install bluetooth /bin/false
install btusb /bin/false

# FireWire (DMA saldirilari)
install firewire_ohci /bin/false
install firewire_sbp2 /bin/false

# Thunderbolt (DMA saldirilari)
install thunderbolt /bin/false

# PDA/Telefon protokolleri
install ipheth /bin/false

# Kablosuz aglar (guvenlik riski)
install p54pci /bin/false
install p54usb /bin/false
install zd1211rw /bin/false
install r8712u /bin/false

# Oyun cihazlari
install joydev /bin/false

# Kart okuyucular
install mousedev /bin/false

# --- NVIDIA MODUL AYARLARI ---
options nvidia NVreg_EnableMSI=1
options nvidia NVreg_RegisterForACPIEvents=1
options nvidia_drm modeset=1 fbdev=1
options nvidia_modeset modeset=1
options nvidia_uvm

# --- AMD MODUL AYARLARI ---
options amdgpu si_support=1 cik_support=1 dc=1 dpm=1
options radeon si_support=0 cik_support=0

# --- KARYA INTEL BLOKER ---
# Bu modul, PCI veriyolunda Intel GPU tespit ederse
# kernel panic atar.
install karya-intel-block

# --- GUZERGAHLAR (Alias'lar) ---
# Intel modullerini yuklemeye calisan her sey
# /bin/false ile karsilassin (sessiz basarisizlik)
blacklist i915
blacklist intel_agp
blacklist intel_gtt
blacklist intel_vsec
blacklist mei
blacklist mei_me
blacklist intel_uncore
blacklist intel_rapl
blacklist intel_pmc_core
