# ============================================================
# Karya Sentinel Yapilandirmasi
# ============================================================
# Kullanici SADECE derin tarama saatini belirler.
# Tespit edilen guvenlik aciklari BEKLENMEZ, HEMEN YAMALANIR.
# Bu dosyadaki saat bilgisi PUBLIC degildir, yayinlanmaz.
# ============================================================

# Derin tarama baslangic saati (00-23)
# Sistem 7/24 calisir, bu sadece agir tarama penceresidir.
KARYA_SENTINEL_DEEP_HOUR=03
KARYA_SENTINEL_DEEP_MIN=00

# Hafif tarama araligi (saniye) - varsayilan 5 dk
KARYA_SENTINEL_INTERVAL=300

# Otomatik yama (true/false)
KARYA_SENTINEL_AUTO_PATCH=true

# E-posta uyarisi (opsiyonel)
# KARYA_SENTINEL_ALERT="guvenlik@example.com"
