# ============================================================
# Karya DE - Genel Guvenlik Ayarlari
# /etc/sysctl.d/99-karya-security.conf
# ============================================================

# Kernel panic on OOM
vm.panic_on_oom=2
kernel.panic_on_oops=1
kernel.panic=10

# Magic SysRQ (Sadece guvenli tuslar)
kernel.sysrq=0

# Kernel log seviyesi (sadece kritik mesajlar)
kernel.printk=3 3 3 3

# Unpriviliged BPF
kernel.unprivileged_bpf_disabled=1
net.core.bpf_jit_enable=0

# perf events
kernel.perf_event_paranoid=3
kernel.perf_event_max_sample_rate=1

# Kexec
kernel.kexec_load_disabled=1

# User namespaces
user.max_user_namespaces=0

# Core dumps
kernel.core_uses_pid=1
fs.suid_dumpable=0

# YALNIZCA okunabilir dosya sistemi (opsiyonel)
# fs.protected_fifos=2
# fs.protected_regular=2
# fs.protected_hardlinks=1
# fs.protected_symlinks=1

# DMA
vm.mmap_min_addr=65536

# NUMA
kernel.numa_balancing=0

# Auto-group scheduling
kernel.sched_autogroup_enabled=0

# ptrace
kernel.yama.ptrace_scope=1

# Karma (random)
kernel.random.trust_cpu=0
kernel.random.trust_bootloader=0
