# Karya DE - NVIDIA GPU Yapılandırması
# Proprietary driver için optimize edilmiş ayarlar

# Xorg
Section "Device"
    Identifier  "NVIDIA GPU"
    Driver      "nvidia"
    Option      "NoLogo" "true"
    Option      "AllowEmptyInitialConfiguration" "true"
    Option      "HardDPMS" "true"
    Option      "TripleBuffer" "true"
    Option      "PreserveVideoMemoryAllocations" "true"
    Option      "PowerMizerEnable" "true"
    Option      "PowerMizerLevel" "0x0001"
    Option      "PowerMizerDefault" "0x0001"
    Option      "ForceCompositionPipeline" "false"
    Option      "ForceFullCompositionPipeline" "false"
    Option      "AllowIndirectGLXProtocol" "false"
    Option      "UseNvKmsCompositionPipeline" "false"
EndSection

# Wayland
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = WLR_NO_HARDWARE_CURSORS,1
# env = KWIN_DRM_NO_AMS,1
# env = KWIN_DRM_FORCE_EGL_STREAMS,1

# KWin
[Compositing]
Backend=opengl
OpenGLIsUnsafe=false
# NVIDIA özel: EGLStreams kullan
KWIN_DRM_USE_EGL_STREAMS=true
KWIN_DRM_NO_AMS=true
