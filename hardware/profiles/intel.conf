# Karya DE - Intel GPU Yapilandirmasi
# Intel GPU'lar resmi olarak DESTEKLENMEZ.
# Bu dosya deneysel kullanim icindir, performans garantisi yoktur.

# Xorg - Intel
Section "Device"
    Identifier  "Intel GPU"
    Driver      "modesetting"
    Option      "TearFree" "true"
    Option      "DRI" "3"
    Option      "TripleBuffer" "true"
    Option      "PageFlip" "true"
    Option      "SwapBuffersWait" "false"
EndSection

# Kernel module
# /etc/modprobe.d/i915.conf
# options i915 enable_guc=2
# options i915 enable_psr=1
# options i915 enable_dc=2
# options i915 disable_power_well=0
# options i915 fastboot=1
# options i915 enable_fbc=1

# KWin
[Compositing]
Backend=xrender
OpenGLIsUnsafe=false
ClientSideDecoration=true
