# ============================================================
# Karya DE - Intel GPU YAPILANDIRMASI YOK
# ============================================================
# Intel GPU'lar Karya DE tarafindan DESTEKLENMEMEKTEDIR.
# Bu dosya sadece bloklama bilgisi icerir.
# ============================================================

# Intel GPU bloklama nedeni:
# 1. PERFORMANS: Intel HD/UHD Graphics serisi, Karya DE'nin
#    glassmorphism, blur, animasyon gibi modern efektlerini
#    akici bir sekilde calistiramaz. Kullanici deneyimi
#    tatmin edici degildir.
#
# 2. VULKAN: Intel'in Vulkan destegi (ANV) ozellikle
#    12. nesil (Alder Lake) oncesinde sinirli, kararsiz
#    ve eksiktir. Karya DE compositor altyapisi tam Vulkan
#    destegine guvenir.
#
# 3. SURUCU: i915 kernel modulu, Intel donanimini
#    tam kapasite kullanmak icin gerekli ozelliklerden
#    yoksundur. GuC yuklemesi, PSR, FBC gibi ozellikler
#    varsayilan olarak kapalidir.
#
# 4. KAYNAK: Gelistirme ekibimiz NVIDIA ve AMD'ye
#    odaklanarak her iki platformda da en iyi deneyimi
#    sunmayi hedeflemektedir.

# Bloklama katmanlari:
# Katman 1: Initramfs hook (boot oncesi PCI taramasi ile)
# Katman 2: DKMS kernel modulu (karya-intel-block.ko)
# Katman 3: Modprobe blacklist (i915 -> /bin/false)
# Katman 4: LSM kernel modulu (karya-security.ko)

# Bu dosyadaki hicbir ayar Intel GPU'yu calistirmaz.
# Sadece NVIDIA veya AMD GPU gecerlidir.
# VM ortaminda calisiyorsaniz VM profili kullanin.

[Intel]
Supported=false
Reason="Performans yetersizligi, Vulkan eksikligi, surucu kisitlamalari"
BlockLevel="kernel (initramfs+DKMS+modprobe+LSM)"
Alternative="NVIDIA veya AMD GPU"
VMWorkaround="VM profili kullanin"
