# Karya DE - AMD GPU Yapılandırması
# amdgpu driver için optimize edilmiş ayarlar

# Xorg - AMD
Section "Device"
    Identifier  "AMD GPU"
    Driver      "amdgpu"
    Option      "TearFree" "true"
    Option      "DRI" "3"
    Option      "VariableRefresh" "true"
    Option      "AsyncFlipSecondaries" "true"
    Option      "PageFlip" "true"
    Option      "SwapBuffersWait" "false"
EndSection

# Kernel modülleri
# modprobe.d/amdgpu.conf
# options amdgpu si_support=1
# options amdgpu dc_support=1
# options amdgpu gpu_recovery=1

# KWin
[Compositing]
Backend=opengl
OpenGLIsUnsafe=false

# Vulkan desteği
# Vulkan driver: radv (open) veya amdvlk (proprietary)
# AMDGPU-PRO varsa amdvlk önerilir
