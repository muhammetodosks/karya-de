# Karya SPEED - Balanced Profile
# Good performance with reasonable power efficiency
# Designed for: Laptop / General Purpose

# CPU Governor
GOVERNOR=ondemand
ENERGY_PERF_PREF=balanced
SCALING_MIN_FREQ=0
SCALING_MAX_FREQ=0
NO_TURBO=0

# I/O Scheduler
IO_SCHEDULER=mq-deadline
IO_QUANTUM=32
IO_NR_REQUESTS=256

# Memory Management
SWAPPINESS=60
VFS_CACHE_PRESSURE=100
DIRTY_RATIO=30
DIRTY_BACKGROUND_RATIO=5
DIRTY_EXPIRE_CENTISECS=3000
DIRTY_WRITEBACK_CENTISECS=1500
MIN_FREE_KBYTES=65536
COMPACTION_PROACTIVENESS=20
EXTFRAG_THRESHOLD=500
KHUGEPAGED_DEFRAG=1
TRANSPARENT_HUGEPAGE=madvise
RECLAIM_COMPACTION_DISABLED=0

# Network
NET_CORE_SOMAXCONN=4096
NET_CORE_NETDEV_MAX_BACKLOG=50000
NET_CORE_RMEM_DEFAULT=131072
NET_CORE_RMEM_MAX=67108864
NET_CORE_WMEM_DEFAULT=131072
NET_CORE_WMEM_MAX=67108864
NET_CORE_OPTMAX_LEN=524288
NET_IPV4_TCP_RMEM="4096 87380 67108864"
NET_IPV4_TCP_WMEM="4096 65536 67108864"
NET_IPV4_TCP_CONG_CONTROL=bbr
NET_IPV4_TCP_NOTIFY_LINGER=1
NET_IPV4_TCP_FASTOPEN=3
NET_IPV4_TCP_SLOW_START_AFTER_IDLE=1
NET_IPV4_TCP_MTU_PROBING=0
NET_IPV4_TCP_RETRIES2=8
NET_IPV4_TCP_FIN_TIMEOUT=30
NET_IPV4_TCP_KEEPALIVE_INTVL=60
NET_IPV4_TCP_KEEPALIVE_PROBES=3
NET_IPV4_TCP_KEEPALIVE_TIME=600

# GPU
GPU_PROFILE=auto
GPU_FORCE_POWER=1
ADAPTIVE_CLOCK=1

# Latency
LATENCY_TARGET=3
HUNG_TASK_TIMEOUT=120
RCUTREE_KTHREAD_PRIO=0
TIMER_SLACK=50
NUMA_BALANCING=1

# Storage
READ_AHEAD_KB=2048
NR_REQUESTS=256
SCHEDULER_TIMEOUT=30000

# Thermal
THERMAL_GOVERNOR=step_wise
