# Karya SPEED - Performance Profile
# Maximum performance, minimum latency
# Designed for: Desktop / Workstation / Gaming

# CPU Governor
GOVERNOR=performance
ENERGY_PERF_PREF=performance
SCALING_MIN_FREQ=0
SCALING_MAX_FREQ=0
NO_TURBO=0

# I/O Scheduler
IO_SCHEDULER=none
IO_QUANTUM=64
IO_NR_REQUESTS=512

# Memory Management
SWAPPINESS=10
VFS_CACHE_PRESSURE=50
DIRTY_RATIO=40
DIRTY_BACKGROUND_RATIO=10
DIRTY_EXPIRE_CENTISECS=3000
DIRTY_WRITEBACK_CENTISECS=1500
MIN_FREE_KBYTES=131072
COMPACTION_PROACTIVENESS=0
EXTFRAG_THRESHOLD=750
KHUGEPAGED_DEFRAG=0
TRANSPARENT_HUGEPAGE=always
RECLAIM_COMPACTION_DISABLED=1

# Network
NET_CORE_SOMAXCONN=65535
NET_CORE_NETDEV_MAX_BACKLOG=100000
NET_CORE_RMEM_DEFAULT=262144
NET_CORE_RMEM_MAX=134217728
NET_CORE_WMEM_DEFAULT=262144
NET_CORE_WMEM_MAX=134217728
NET_CORE_OPTMAX_LEN=1048576
NET_IPV4_TCP_RMEM="4096 87380 134217728"
NET_IPV4_TCP_WMEM="4096 65536 134217728"
NET_IPV4_TCP_CONG_CONTROL=bbr
NET_IPV4_TCP_NOTIFY_LINGER=1
NET_IPV4_TCP_FASTOPEN=3
NET_IPV4_TCP_SLOW_START_AFTER_IDLE=0
NET_IPV4_TCP_MTU_PROBING=1
NET_IPV4_TCP_RETRIES2=15
NET_IPV4_TCP_FIN_TIMEOUT=15
NET_IPV4_TCP_KEEPALIVE_INTVL=30
NET_IPV4_TCP_KEEPALIVE_PROBES=5
NET_IPV4_TCP_KEEPALIVE_TIME=300

# GPU
GPU_PROFILE=high
GPU_FORCE_POWER=0
ADAPTIVE_CLOCK=0

# Latency
LATENCY_TARGET=0
HUNG_TASK_TIMEOUT=30
RCUTREE_KTHREAD_PRIO=1
TIMER_SLACK=0
NUMA_BALANCING=0

# Storage
READ_AHEAD_KB=4096
NR_REQUESTS=512
SCHEDULER_TIMEOUT=10000

# Thermal
THERMAL_GOVERNOR=performance
