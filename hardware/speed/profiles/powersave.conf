# Karya SPEED - Powersave Profile
# Maximum power efficiency, minimum power draw
# Designed for: Battery / Laptop / Silent PC

# CPU Governor
GOVERNOR=powersave
ENERGY_PERF_PREF=power
SCALING_MIN_FREQ=0
SCALING_MAX_FREQ=0
NO_TURBO=1

# I/O Scheduler
IO_SCHEDULER=mq-deadline
IO_QUANTUM=16
IO_NR_REQUESTS=128

# Memory Management
SWAPPINESS=100
VFS_CACHE_PRESSURE=200
DIRTY_RATIO=20
DIRTY_BACKGROUND_RATIO=3
DIRTY_EXPIRE_CENTISECS=6000
DIRTY_WRITEBACK_CENTISECS=3000
MIN_FREE_KBYTES=32768
COMPACTION_PROACTIVENESS=100
EXTFRAG_THRESHOLD=250
KHUGEPAGED_DEFRAG=3
TRANSPARENT_HUGEPAGE=never
RECLAIM_COMPACTION_DISABLED=0

# Network
NET_CORE_SOMAXCONN=1024
NET_CORE_NETDEV_MAX_BACKLOG=10000
NET_CORE_RMEM_DEFAULT=65536
NET_CORE_RMEM_MAX=16777216
NET_CORE_WMEM_DEFAULT=65536
NET_CORE_WMEM_MAX=16777216
NET_CORE_OPTMAX_LEN=262144
NET_IPV4_TCP_RMEM="4096 87380 16777216"
NET_IPV4_TCP_WMEM="4096 65536 16777216"
NET_IPV4_TCP_CONG_CONTROL=cubic
NET_IPV4_TCP_NOTIFY_LINGER=0
NET_IPV4_TCP_FASTOPEN=0
NET_IPV4_TCP_SLOW_START_AFTER_IDLE=1
NET_IPV4_TCP_MTU_PROBING=0
NET_IPV4_TCP_RETRIES2=5
NET_IPV4_TCP_FIN_TIMEOUT=60
NET_IPV4_TCP_KEEPALIVE_INTVL=120
NET_IPV4_TCP_KEEPALIVE_PROBES=2
NET_IPV4_TCP_KEEPALIVE_TIME=1200

# GPU
GPU_PROFILE=low
GPU_FORCE_POWER=1
ADAPTIVE_CLOCK=1

# Latency
LATENCY_TARGET=10
HUNG_TASK_TIMEOUT=300
RCUTREE_KTHREAD_PRIO=0
TIMER_SLACK=100
NUMA_BALANCING=1

# Storage
READ_AHEAD_KB=512
NR_REQUESTS=64
SCHEDULER_TIMEOUT=60000

# Thermal
THERMAL_GOVERNOR=powersave
