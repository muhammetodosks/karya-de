<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Noto Sans', sans-serif;
    overflow: hidden;
  }

  .container {
    text-align: center;
  }

  .logo {
    width: 120px;
    height: 120px;
    background: linear-gradient(135deg, #4a90d9, #6c5ce7);
    border-radius: 30px;
    margin: 0 auto 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    color: white;
    font-weight: bold;
    box-shadow: 0 20px 60px rgba(74, 144, 217, 0.3);
    animation: pulse 2s ease-in-out infinite;
  }

  .bar {
    width: 240px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    margin: 0 auto;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, #4a90d9, #6c5ce7);
    border-radius: 2px;
    animation: loading 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @keyframes loading {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">K</div>
  <div class="bar"><div class="bar-fill"></div></div>
</div>
</body>
</html>
