<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(30,30,50,0.85)"/>
      <stop offset="100%" stop-color="rgba(20,20,40,0.95)"/>
    </linearGradient>
    <linearGradient id="window1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(40,45,70,0.7)"/>
      <stop offset="100%" stop-color="rgba(30,35,60,0.85)"/>
    </linearGradient>
    <linearGradient id="window2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(50,55,80,0.6)"/>
      <stop offset="100%" stop-color="rgba(40,45,70,0.75)"/>
    </linearGradient>
    <linearGradient id="dock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(30,30,50,0.7)"/>
      <stop offset="100%" stop-color="rgba(20,20,40,0.9)"/>
    </linearGradient>
    <filter id="glass1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Wallpaper gradient -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Decorative shapes on wallpaper -->
  <circle cx="200" cy="200" r="150" fill="rgba(74,144,217,0.05)"/>
  <circle cx="1100" cy="500" r="200" fill="rgba(108,92,231,0.05)"/>
  <circle cx="900" cy="150" r="100" fill="rgba(74,144,217,0.03)"/>

  <!-- Window 1 (left, terminal) -->
  <rect x="60" y="80" width="520" height="360" rx="12" fill="url(#window1)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>
  <rect x="60" y="80" width="520" height="36" rx="12" fill="rgba(30,35,60,0.9)"/>
  <rect x="60" y="104" width="520" height="12" fill="rgba(30,35,60,0.9)"/>
  <!-- Window buttons -->
  <circle cx="84" cy="98" r="7" fill="#ff5f57"/>
  <circle cx="106" cy="98" r="7" fill="#ffbd2e"/>
  <circle cx="128" cy="98" r="7" fill="#28c840"/>
  <!-- Terminal title -->
  <text x="260" y="103" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">karya@karya-de: ~/karya-de</text>
  <!-- Terminal content -->
  <text x="80" y="145" font-family="monospace" font-size="11" fill="#4a90d9">karya@karya-de:~$</text>
  <text x="200" y="145" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.8)"> make build</text>
  <text x="80" y="165" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)">[ 12%] Building KWin with Karya tiling...</text>
  <text x="80" y="185" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)">[ 35%] Compiling karyatilemanager.cpp</text>
  <text x="80" y="205" font-family="monospace" font-size="11" fill="#28c840">[ 56%] Glassmorphism effect enabled</text>
  <text x="80" y="225" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)">[ 78%] Building plasma-shell...</text>
  <text x="80" y="245" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.6)">[ 94%] Installing Karya widgets...</text>
  <text x="80" y="270" font-family="monospace" font-size="11" fill="#4a90d9">karya@karya-de:~$</text>
  <text x="80" y="290" font-family="monospace" font-size="11" fill="#28c840">✓ Karya DE build complete!</text>
  <text x="80" y="310" font-family="monospace" font-size="11" fill="#FFD700">Karya DE v1.0.0 ready</text>

  <!-- Window 2 (right, hava durumu widget) -->
  <rect x="660" y="80" width="320" height="280" rx="12" fill="url(#window2)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>
  <rect x="660" y="80" width="320" height="36" rx="12" fill="rgba(30,35,60,0.9)"/>
  <text x="820" y="103" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">Karya Hava - İstanbul</text>
  <text x="820" y="155" font-family="sans-serif" font-size="54" fill="white" text-anchor="middle">24°C</text>
  <text x="820" y="180" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">☀️ Açık, hissedilen 22°C</text>
  <!-- Weekly forecast mini -->
  <g transform="translate(680, 210)">
    <text x="0" y="0" font-size="11" fill="rgba(255,255,255,0.5">Pzt</text>
    <text x="50" y="0" font-size="11" fill="rgba(255,255,255,0.5">Sal</text>
    <text x="100" y="0" font-size="11" fill="rgba(255,255,255,0.5">Çar</text>
    <text x="150" y="0" font-size="11" fill="rgba(255,255,255,0.5">Per</text>
    <text x="200" y="0" font-size="11" fill="rgba(255,255,255,0.5">Cum</text>
    <text x="250" y="0" font-size="11" fill="rgba(255,255,255,0.5">Cmt</text>
    <text x="290" y="0" font-size="11" fill="rgba(255,255,255,0.5">Paz</text>
    <text x="0" y="24" font-size="18">☀️</text>
    <text x="50" y="24" font-size="18">☀️</text>
    <text x="100" y="24" font-size="18">⛅</text>
    <text x="150" y="24" font-size="18">🌧</text>
    <text x="200" y="24" font-size="18">☀️</text>
    <text x="250" y="24" font-size="18">⛅</text>
    <text x="290" y="24" font-size="18">☀️</text>
    <text x="0" y="46" font-size="12" fill="white">26°</text>
    <text x="50" y="46" font-size="12" fill="white">28°</text>
    <text x="100" y="46" font-size="12" fill="white">22°</text>
    <text x="150" y="46" font-size="12" fill="white">18°</text>
    <text x="200" y="46" font-size="12" fill="white">25°</text>
    <text x="250" y="46" font-size="12" fill="white">23°</text>
    <text x="290" y="46" font-size="12" fill="white">27°</text>
  </g>

  <!-- Window 3 (right bottom, namaz widget) -->
  <rect x="660" y="380" width="320" height="200" rx="12" fill="url(#window2)" stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#shadow)"/>
  <rect x="660" y="380" width="320" height="36" rx="12" fill="rgba(30,35,60,0.9)"/>
  <text x="820" y="403" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">Karya Namaz - İstanbul</text>
  <g transform="translate(680, 435)">
    <text x="0" y="0" font-size="12" fill="rgba(255,255,255,0.5)">İmsak</text>
    <text x="0" y="22" font-size="12" fill="rgba(255,255,255,0.5)">Güneş</text>
    <text x="0" y="44" font-size="12" fill="rgba(255,255,255,0.5)">Öğle</text>
    <text x="0" y="66" font-size="12" fill="rgba(255,255,255,0.5)">İkindi</text>
    <text x="0" y="88" font-size="13" fill="#FFD700" font-weight="bold">Akşam</text>
    <text x="0" y="110" font-size="12" fill="rgba(255,255,255,0.5)">Yatsı</text>
    <text x="120" y="0" font-size="12" fill="white">04:28</text>
    <text x="120" y="22" font-size="12" fill="white">06:02</text>
    <text x="120" y="44" font-size="12" fill="white">13:15</text>
    <text x="120" y="66" font-size="12" fill="white">17:10</text>
    <text x="120" y="88" font-size="13" fill="#FFD700" font-weight="bold">20:25</text>
    <text x="120" y="110" font-size="12" fill="white">22:00</text>
  </g>
  <text x="820" y="565" font-family="sans-serif" font-size="11" fill="#FFD700" text-anchor="middle">Akşam'a kalan: 2s 45dk</text>

  <!-- Top Panel -->
  <rect x="0" y="0" width="1280" height="38" fill="url(#panel)" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>

  <!-- Kickoff -->
  <rect x="12" y="7" width="24" height="24" rx="6" fill="url(#window1)"/>
  <text x="24" y="24" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">K</text>

  <!-- Icons in panel -->
  <g transform="translate(50, 10)">
    <rect x="0" y="0" width="24" height="20" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="12" y="15" font-size="10" fill="white" text-anchor="middle">📁</text>
    <rect x="32" y="0" width="24" height="20" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="44" y="15" font-size="10" fill="white" text-anchor="middle">⬛</text>
    <rect x="64" y="0" width="24" height="20" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="76" y="15" font-size="10" fill="white" text-anchor="middle">🦊</text>
    <rect x="96" y="0" width="24" height="20" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="108" y="15" font-size="10" fill="white" text-anchor="middle">✏️</text>
  </g>

  <!-- System tray right side -->
  <g transform="translate(1000, 10)">
    <text x="0" y="14" font-size="14" fill="rgba(255,255,255,0.7)">🔊</text>
    <text x="30" y="14" font-size="14" fill="rgba(255,255,255,0.7)">📶</text>
    <text x="60" y="14" font-size="14" fill="rgba(255,255,255,0.7)">🔋</text>
  </g>

  <!-- Clock in panel -->
  <rect x="1120" y="4" width="140" height="30" rx="8" fill="rgba(255,255,255,0.05)"/>
  <text x="1190" y="17" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">15:24</text>
  <text x="1190" y="29" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">18 Temmuz 2026 Cumartesi</text>

  <!-- Bottom Dock -->
  <rect x="390" y="660" width="500" height="52" rx="16" fill="url(#dock)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5" filter="url(#shadow)"/>

  <!-- Dock icons -->
  <g transform="translate(410, 668)">
    <rect x="0" y="0" width="36" height="36" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="18" y="25" font-size="16" fill="white" text-anchor="middle">📁</text>
    <rect x="46" y="0" width="36" height="36" rx="8" fill="rgba(255,255,255,0.15)"/>
    <text x="64" y="25" font-size="16" fill="white" text-anchor="middle">⬛</text>
    <rect x="92" y="0" width="36" height="36" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="110" y="25" font-size="16" fill="white" text-anchor="middle">🦊</text>
    <rect x="138" y="0" width="36" height="36" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="156" y="25" font-size="16" fill="white" text-anchor="middle">✏️</text>
    <rect x="184" y="0" width="36" height="36" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="202" y="25" font-size="16" fill="white" text-anchor="middle">🖼️</text>
    <rect x="230" y="0" width="36" height="36" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="248" y="25" font-size="16" fill="white" text-anchor="middle">🔢</text>
    <rect x="276" y="0" width="36" height="36" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="294" y="25" font-size="16" fill="white" text-anchor="middle">📷</text>
    <rect x="322" y="0" width="36" height="36" rx="8" fill="rgba(255,255,255,0.1)"/>
    <text x="340" y="25" font-size="16" fill="white" text-anchor="middle">⚙️</text>
  </g>

  <!-- Indicator dot under active app -->
  <circle cx="474" cy="706" r="3" fill="#4a90d9"/>

  <!-- Label -->
  <text x="640" y="650" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">Karya DE v1.0.0 · KDE Plasma 6 Fork</text>
</svg>
