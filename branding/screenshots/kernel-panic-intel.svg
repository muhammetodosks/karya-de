<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Courier New', 'DejaVu Sans Mono', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </linearGradient>
  </defs>

  <!-- Terminal arka plan -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Terminal cercevesi -->
  <rect x="20" y="20" width="760" height="460" rx="8" fill="#0d0015" stroke="#4a0000" stroke-width="2"/>

  <!-- Terminal basligi -->
  <rect x="20" y="20" width="760" height="36" rx="8" fill="#1a0020"/>
  <rect x="20" y="44" width="760" height="12" fill="#1a0020"/>
  <circle cx="42" cy="38" r="6" fill="#ff3b47"/>
  <circle cx="62" cy="38" r="6" fill="#ffb700"/>
  <circle cx="82" cy="38" r="6" fill="#00d648"/>
  <text x="400" y="44" fill="#666" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle">karya-intel-blocker</text>

  <!-- PANIC YAZISI -->
  <rect x="160" y="80" width="480" height="60" rx="4" fill="#ff0000" opacity="0.15"/>
  <rect x="160" y="80" width="480" height="60" rx="4" fill="none" stroke="#ff0000" stroke-width="2" opacity="0.5"/>
  <text x="400" y="118" fill="#ff2222" font-size="28" font-weight="bold" text-anchor="middle">KERNEL PANIC - INTEL GPU TESPIT EDIEDI</text>

  <!-- Hata mesaji -->
  <text x="60" y="180" fill="#ff6666" font-size="14">
    <tspan x="60" dy="0">Karya DE Intel Blocker: Intel GPU algilandi</tspan>
    <tspan x="60" dy="22">Vendor: 0x8086 (Intel Corporation)</tspan>
    <tspan x="60" dy="22">Device: 0x9bc4 (CometLake-H GT2 [UHD Graphics])</tspan>
    <tspan x="60" dy="22">Class: 0x030000 (VGA Compatible Controller)</tspan>
    <tspan x="60" dy="30" font-weight="bold" fill="#ff4444">HATA: Intel GPU'lar Karya DE tarafindan DESTEKLENMEMEKTEDIR!</tspan>
    <tspan x="60" dy="24">Sebep 1: Performans yetersizligi (glassmorphism/blur akici degil)</tspan>
    <tspan x="60" dy="22">Sebep 2: Vulkan destegi eksikligi (ANV kararsiz/eksik)</tspan>
    <tspan x="60" dy="22">Sebep 3: Surucu kisitlamalari (i915 kernel limitasyonlari)</tspan>
    <tspan x="60" dy="22">Sebep 4: Kaynak optimizasyonu (NVIDIA/AMD odakli)</tspan>
    <tspan x="60" dy="30" fill="#ffcc00">Cozum: NVIDIA veya AMD GPU kullaniniz.</tspan>
    <tspan x="60" dy="22" fill="#ffcc00">VM'de calisiyorsaniz VM GPU surucusu kullaniniz.</tspan>
    <tspan x="60" dy="30" fill="#888">Sistem 5 saniye icinde duracak...</tspan>
    <tspan x="60" dy="22" fill="#888">Modul: karya-intel-block.ko (DKMS v1.0.0)</tspan>
    <tspan x="60" dy="22" fill="#888">Initramfs hook: karya-intel-block (boot oncesi bloklama)</tspan>
  </text>

  <!-- Alt kisim -->
  <rect x="60" y="380" width="680" height="60" rx="4" fill="#4a0000" opacity="0.3"/>
  <text x="400" y="408" fill="#ff4444" font-size="13" text-anchor="middle">
    KARYA-DE: Intel GPU desteklenmiyor - Sistem guvenlik nedeniyle durduruldu
  </text>
  <text x="400" y="428" fill="#888" font-size="11" text-anchor="middle">
    Kernel panic - not syncing: karya-intel-block.c:111 karya_intel_probe()
  </text>
</svg>
