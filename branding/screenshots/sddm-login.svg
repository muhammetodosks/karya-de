<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Noto Sans','DejaVu Sans',sans-serif">
  <defs>
    <linearGradient id="lgbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="sh3"><feDropShadow dx="0" dy="6" stdDeviation="20" flood-color="rgba(0,0,0,0.6)"/></filter>
  </defs>

  <rect width="800" height="500" fill="url(#lgbg)"/>
  <circle cx="640" cy="380" r="180" fill="rgba(108,92,231,0.04)"/>
  <circle cx="120" cy="120" r="120" fill="rgba(74,144,217,0.04)"/>

  <!-- SDDM background gradient overlay -->
  <rect width="800" height="500" fill="url(#lgbg)" opacity="0.3"/>

  <!-- Login card -->
  <rect x="220" y="60" width="360" height="380" rx="24" fill="rgba(30,30,50,0.6)" stroke="rgba(255,255,255,0.06)" filter="url(#sh3)"/>
  <rect x="220" y="60" width="360" height="380" rx="24" fill="rgba(30,30,50,0.3)"/>

  <!-- Logo -->
  <rect x="364" y="88" width="72" height="72" rx="20" fill="#4a90d9"/>
  <text x="400" y="132" font-size="36" fill="white" text-anchor="middle" font-weight="bold">K</text>

  <text x="400" y="185" font-size="20" fill="white" text-anchor="middle" font-weight="bold">Karya DE</text>
  <text x="400" y="205" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle">Hos Geldiniz</text>

  <!-- Username field -->
  <rect x="248" y="230" width="304" height="44" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
  <text x="264" y="256" font-size="14" fill="rgba(255,255,255,0.5)">Kullanici Adi</text>

  <!-- Password field -->
  <rect x="248" y="284" width="304" height="44" rx="12" fill="rgba(255,255,255,0.06)" stroke="#4a90d9" stroke-width="2"/>
  <text x="264" y="310" font-size="14" fill="rgba(255,255,255,0.7)">••••••••</text>

  <!-- Login button -->
  <rect x="248" y="340" width="304" height="44" rx="12" fill="#4a90d9"/>
  <text x="400" y="367" font-size="15" fill="white" text-anchor="middle" font-weight="bold">Giris Yap</text>

  <!-- Session selector -->
  <rect x="248" y="296" width="180" height="28" rx="8" fill="rgba(255,255,255,0.05)"/>
  <text x="264" y="315" font-size="11" fill="rgba(255,255,255,0.4)">Oturum:</text>
  <rect x="320" y="296" width="100" height="28" rx="8" fill="rgba(255,255,255,0.08)"/>
  <text x="370" y="315" font-size="11" fill="white">Karya DE (Wayland)</text>

  <!-- Bottom buttons -->
  <rect x="260" y="396" width="120" height="28" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="320" y="414" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle">Kapa</text>
  <rect x="420" y="396" width="120" height="28" rx="8" fill="rgba(255,255,255,0.04)"/>
  <text x="480" y="414" font-size="12" fill="rgba(255,255,255,0.4)" text-anchor="middle">Yeniden Baslat</text>

  <text x="400" y="450" font-size="11" fill="rgba(255,255,255,0.15)" text-anchor="middle">Karya DE v1.0.0</text>
</svg>
