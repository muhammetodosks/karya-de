<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Courier New', 'DejaVu Sans Mono', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Ust baslik -->
  <text x="30" y="35" fill="#fff" font-size="16" font-weight="bold">Karya DE AppArmor Profilleri</text>
  <text x="30" y="55" fill="#888" font-size="12">sudo aa-status</text>

  <!-- Baslik: Profil / Mod / Durum -->
  <rect x="30" y="75" width="740" height="35" rx="4" fill="#1e1e32"/>
  <text x="50" y="98" fill="#ffcc00" font-size="13" font-weight="bold">PROFIL</text>
  <text x="300" y="98" fill="#ffcc00" font-size="13" font-weight="bold">MOD</text>
  <text x="450" y="98" fill="#ffcc00" font-size="13" font-weight="bold">DURUM</text>
  <text x="580" y="98" fill="#ffcc00" font-size="13" font-weight="bold">IHLA</text>

  <!-- Profil 1: OOBE -->
  <rect x="30" y="115" width="740" height="40" rx="4" fill="#141428" stroke="#333" stroke-width="1"/>
  <circle cx="50" cy="135" r="5" fill="#00d648"/>
  <text x="70" y="140" fill="#fff" font-size="13">karya-oobe</text>
  <text x="300" y="140" fill="#aaa" font-size="13">enforce</text>
  <text x="450" y="140" fill="#00d648" font-size="13">Yuklu</text>
  <text x="580" y="140" fill="#666" font-size="13">0</text>

  <!-- Profil 2: Widgets -->
  <rect x="30" y="160" width="740" height="40" rx="4" fill="#141428" stroke="#333" stroke-width="1"/>
  <circle cx="50" cy="180" r="5" fill="#00d648"/>
  <text x="70" y="185" fill="#fff" font-size="13">karya-widgets</text>
  <text x="300" y="185" fill="#aaa" font-size="13">enforce</text>
  <text x="450" y="185" fill="#00d648" font-size="13">Yuklu</text>
  <text x="580" y="185" fill="#666" font-size="13">0</text>

  <!-- Profil 3: KWin -->
  <rect x="30" y="205" width="740" height="40" rx="4" fill="#141428" stroke="#333" stroke-width="1"/>
  <circle cx="50" cy="225" r="5" fill="#00d648"/>
  <text x="70" y="230" fill="#fff" font-size="13">kwin-karya</text>
  <text x="300" y="230" fill="#aaa" font-size="13">enforce</text>
  <text x="450" y="230" fill="#00d648" font-size="13">Yuklu</text>
  <text x="580" y="230" fill="#666" font-size="13">0</text>

  <!-- Profil 4: Drivers -->
  <rect x="30" y="250" width="740" height="40" rx="4" fill="#141428" stroke="#333" stroke-width="1"/>
  <circle cx="50" cy="270" r="5" fill="#00d648"/>
  <text x="70" y="275" fill="#fff" font-size="13">karya-drivers</text>
  <text x="300" y="275" fill="#aaa" font-size="13">enforce</text>
  <text x="450" y="275" fill="#00d648" font-size="13">Yuklu</text>
  <text x="580" y="275" fill="#666" font-size="13">0</text>

  <!-- Alt ayrac -->
  <rect x="30" y="310" width="740" height="1" fill="#333"/>

  <!-- Ozet -->
  <text x="50" y="340" fill="#888" font-size="13">4 profil yuklu | 4 enforce | 0 complain | 0 ihlal</text>

  <!-- Kernel modulu durumu -->
  <text x="50" y="370" fill="#ffcc00" font-size="14" font-weight="bold">Karya DE Security Module (karya-security.ko)</text>
  <rect x="50" y="385" width="700" height="80" rx="4" fill="#141428" stroke="#333" stroke-width="1"/>
  <text x="70" y="408" fill="#00d648" font-size="13">Status: ACTIVE (Lockdown: confidentiality)</text>
  <text x="70" y="428" fill="#fff" font-size="13">Intel Block: ENABLED | Exec Protect: ENABLED</text>
  <text x="70" y="448" fill="#888" font-size="13">ProcFS: /proc/karya/sec/ (status, version, violations)</text>

  <!-- Alt bilgi -->
  <text x="600" y="485" fill="#555" font-size="11">Karya DE v1.0.0 | 2026</text>
</svg>
