<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Noto Sans','DejaVu Sans',sans-serif">
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="cardbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(25,28,50,0.8)"/><stop offset="100%" stop-color="rgba(20,22,45,0.95)"/>
    </linearGradient>
    <filter id="sh2"><feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="rgba(0,0,0,0.5)"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#wbg)"/>

  <!-- Wizard window -->
  <rect x="100" y="40" width="600" height="520" rx="16" fill="url(#cardbg)" stroke="rgba(255,255,255,0.06)" filter="url(#sh2)"/>

  <!-- Title bar -->
  <rect x="100" y="40" width="600" height="50" rx="16" fill="rgba(25,28,50,0.95)"/>
  <rect x="100" y="74" width="600" height="16" fill="rgba(25,28,50,0.95)"/>
  <circle cx="124" cy="65" r="6" fill="#ff5f57"/><circle cx="144" cy="65" r="6" fill="#ffbd2e"/><circle cx="164" cy="65" r="6" fill="#28c840"/>
  <text x="400" y="69" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Karya DE - Kurulum Sihirbazi</text>

  <!-- Step indicator -->
  <g transform="translate(140, 100)">
    <rect x="0" y="0" width="32" height="32" rx="16" fill="#4a90d9"/>
    <text x="16" y="20" font-size="12" fill="white" text-anchor="middle" font-weight="bold">1</text>
    <rect x="40" y="14" width="60" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="108" y="0" width="32" height="32" rx="16" fill="#4a90d9"/>
    <text x="124" y="20" font-size="12" fill="white" text-anchor="middle" font-weight="bold">2</text>
    <rect x="148" y="14" width="60" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="216" y="0" width="32" height="32" rx="16" fill="#4a90d9"/>
    <text x="232" y="20" font-size="12" fill="white" text-anchor="middle" font-weight="bold">3</text>
    <rect x="256" y="14" width="60" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="324" y="0" width="32" height="32" rx="16" fill="#4a90d9"/>
    <text x="340" y="20" font-size="12" fill="white" text-anchor="middle" font-weight="bold">4</text>
    <rect x="364" y="14" width="60" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="432" y="0" width="32" height="32" rx="16" fill="rgba(74,144,217,0.3)"/>
    <text x="448" y="20" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="middle">5</text>
    <rect x="472" y="14" width="60" height="4" rx="2" fill="rgba(255,255,255,0.05)"/>
    <rect x="540" y="0" width="32" height="32" rx="16" fill="rgba(255,255,255,0.05)"/>
    <text x="556" y="20" font-size="12" fill="rgba(255,255,255,0.2)" text-anchor="middle">6</text>
  </g>

  <!-- Content: GPU Selection page -->
  <g transform="translate(140, 155)">
    <text y="0" font-size="22" fill="white" font-weight="bold">GPU Surucu Secimi</text>
    <text y="28" font-size="13" fill="rgba(255,255,255,0.5)">Sisteminizde algilanan GPU'ya gore surucu secin:</text>

    <rect x="0" y="48" width="520" height="44" rx="10" fill="rgba(74,144,217,0.12)" stroke="rgba(74,144,217,0.3)"/>
    <circle cx="20" cy="70" r="8" fill="#4a90d9"/>
    <circle cx="20" cy="70" r="3" fill="white"/>
    <text x="40" y="66" font-size="15" fill="white" font-weight="bold">NVIDIA Proprietary Driver</text>
    <text x="40" y="84" font-size="11" fill="rgba(255,255,255,0.5)">En iyi performans ve oyun destegi. Tum NVIDIA GPU'lar icin onerilir.</text>
    <text x="470" y="70" font-size="10" fill="#2ecc71" font-weight="bold">ONERILEN</text>

    <rect x="0" y="100" width="520" height="44" rx="10" fill="rgba(255,255,255,0.03)"/>
    <circle cx="20" cy="122" r="8" fill="transparent" stroke="rgba(255,255,255,0.2)"/>
    <text x="40" y="118" font-size="14" fill="rgba(255,255,255,0.7)">Nouveau (Acik Kaynak)</text>
    <text x="40" y="136" font-size="11" fill="rgba(255,255,255,0.4)">Dusuk performans, yuksek uyumluluk. Eski GPU'lar icin.</text>

    <rect x="0" y="152" width="520" height="44" rx="10" fill="rgba(255,255,255,0.03)"/>
    <circle cx="20" cy="174" r="8" fill="transparent" stroke="rgba(255,255,255,0.2)"/>
    <text x="40" y="170" font-size="14" fill="rgba(255,255,255,0.7)">NVIDIA Optimus (Laptop HD)</text>
    <text x="40" y="188" font-size="11" fill="rgba(255,255,255,0.4)">Harici NVIDIA + Dahili Intel gecisli laptoplar icin.</text>

    <!-- Detected HW -->
    <rect x="0" y="215" width="520" height="36" rx="10" fill="rgba(255,255,255,0.03)"/>
    <text x="16" y="237" font-size="12" fill="rgba(255,255,255,0.4)">Algilanan GPU: NVIDIA GeForce RTX 3060</text>
  </g>

  <!-- Buttons -->
  <rect x="500" y="500" width="100" height="38" rx="10" fill="#4a90d9"/>
  <text x="550" y="525" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Ileri ></text>

  <rect x="390" y="500" width="100" height="38" rx="10" fill="transparent" stroke="rgba(255,255,255,0.15)"/>
  <text x="440" y="525" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">Geri</text>

  <text x="120" y="525" font-size="12" fill="rgba(255,255,255,0.2)">Karya DE v1.0.0 Kurulum</text>
</svg>
