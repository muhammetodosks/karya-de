<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="k" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="#4a90d9" stroke-width="2"/>

  <!-- K letter (stylized) -->
  <g transform="translate(64, 44)">
    <!-- Vertical line -->
    <rect x="20" y="20" width="18" height="128" rx="9" fill="url(#k)"/>
    <!-- Upper diagonal -->
    <path d="M38 84 L38 40 L110 40 Z" fill="url(#k)" opacity="0.9"/>
    <!-- Lower diagonal -->
    <path d="M38 84 L38 148 L110 148 Z" fill="url(#k)" opacity="0.7"/>
    <!-- Middle accent -->
    <circle cx="80" cy="84" r="12" fill="#FFD700" opacity="0.8"/>
  </g>

  <!-- Small decorative dots -->
  <circle cx="192" cy="48" r="4" fill="#4a90d9" opacity="0.5"/>
  <circle cx="208" cy="96" r="3" fill="#6c5ce7" opacity="0.4"/>
  <circle cx="48" cy="192" r="3" fill="#4a90d9" opacity="0.3"/>
</svg>
